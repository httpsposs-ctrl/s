<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quake Dev Hub — контакты и ресурсы.">
    <title>Quake | Dev Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --magic: #bd00ff;
            --bg-deep: #050510;
            --bg-mid: #0b1020;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.14);
            --text-dim: rgba(255, 255, 255, 0.74);
            --font-code: 'Consolas', 'Segoe UI', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-code);
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 210, 255, 0.11), transparent 35%),
                radial-gradient(circle at 80% 80%, rgba(189, 0, 255, 0.12), transparent 32%),
                linear-gradient(145deg, var(--bg-deep), var(--bg-mid));
            position: relative;
            color: #fff;
            padding: 20px;
        }

        #tsparticles {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            opacity: 0.45;
            animation: drift 18s ease-in-out infinite alternate;
        }

        .orb.one {
            width: 220px;
            height: 220px;
            background: rgba(0, 210, 255, 0.3);
            top: 10%;
            left: 6%;
        }

        .orb.two {
            width: 280px;
            height: 280px;
            background: rgba(189, 0, 255, 0.24);
            bottom: 8%;
            right: 5%;
            animation-delay: 1.5s;
        }

        @keyframes drift {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(20px, -14px, 0) scale(1.08); }
        }

        .container {
            background: rgba(10, 10, 20, 0.66);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            padding: 32px 28px;
            border-radius: 28px;
            width: min(92vw, 430px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45), inset 0 0 24px rgba(189, 0, 255, 0.06);
            position: relative;
            z-index: 1;
            transition: transform 0.45s ease;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            z-index: -1;
            background: linear-gradient(45deg, rgba(0, 210, 255, 0.6), transparent, rgba(189, 0, 255, 0.6));
            opacity: 0.24;
            filter: blur(14px);
        }

        .profile-wrapper {
            width: 118px;
            height: 118px;
            margin: 0 auto 16px;
            position: relative;
            padding: 4px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
        }

        .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px dashed var(--primary);
            animation: spin 16s linear infinite;
            opacity: 0.55;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-shadow: 0 0 14px rgba(189, 0, 255, 0.35);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            justify-content: center;
            gap: 9px;
            margin-bottom: 18px;
            align-items: center;
        }

        .subtitle i {
            color: var(--magic);
            font-size: 11px;
        }

        .quality-panel {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .quality-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.76);
            gap: 8px;
        }

        .sparkline {
            display: block;
            width: 100%;
            height: 34px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--glass);
            color: rgba(255,255,255,0.92);
            text-decoration: none;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.28s ease, background-color 0.28s ease, border-color 0.28s ease;
            cursor: pointer;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .link-card i {
            transition: transform 0.2s ease;
        }

        .link-card:hover i {
            transform: scale(1.08);
            color: var(--primary);
        }

        .link-card.primary {
            border-color: rgba(0, 210, 255, 0.38);
        }

        .link-card.primary i {
            color: var(--primary);
        }

        @media (max-width: 460px) {
            .container {
                padding: 24px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="tsparticles" aria-hidden="true"></div>
    <div class="orb one" aria-hidden="true"></div>
    <div class="orb two" aria-hidden="true"></div>

    <main class="container">
        <div class="profile-wrapper">
            <img src="avatar.jpg" alt="Аватар" class="profile-img">
            <div class="ring"></div>
        </div>

        <h1>Quake</h1>
        <div class="subtitle">
            <i class="fas fa-code"></i> Ruthincite
            <span style="opacity: 0.35">|</span>
            <i class="fas fa-cube"></i> Creator
        </div>

        <section class="quality-panel">
            <div class="quality-header">
                <span><i class="fas fa-gauge-high"></i></span>
            </div>
            <svg class="sparkline" viewBox="0 0 100 24" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="spark-gradient" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.9"></stop>
                        <stop offset="100%" stop-color="#bd00ff" stop-opacity="0.9"></stop>
                    </linearGradient>
                </defs>
                <polyline fill="none" stroke="url(#spark-gradient)" stroke-width="1.6" points="0,18 8,16 16,17 24,13 32,12 40,14 48,10 56,11 64,8 72,10 80,7 88,9 96,6 100,7"></polyline>
            </svg>
        </section>

        <div class="links">
            <a href="https://t.me/crimewox_" target="_blank" rel="noopener noreferrer" class="link-card primary">
                <i class="fab fa-telegram-plane"></i> Написать мне
            </a>

            <a href="https://t.me/crimick_sb" target="_blank" rel="noopener noreferrer" class="link-card">
                <i class="fas fa-bullhorn"></i> Мой канал
            </a>

            <a href="https://t.me/adapt_crima" target="_blank" rel="noopener noreferrer" class="link-card">
                <i class="fas fa-link"></i> Переходник
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
        if (window.tsParticles) {
            tsParticles.load('tsparticles', {
                fpsLimit: 60,
                particles: {
                    number: { value: 40, density: { enable: true, area: 800 } },
                    color: { value: ['#00d2ff', '#bd00ff', '#ffffff'] },
                    shape: { type: 'circle' },
                    opacity: { value: 0.35 },
                    size: { value: { min: 1, max: 3 } },
                    move: {
                        enable: true,
                        speed: 0.8,
                        direction: 'none',
                        random: false,
                        straight: false,
                        outModes: { default: 'out' }
                    },
                    links: {
                        enable: true,
                        distance: 120,
                        color: '#4d5d83',
                        opacity: 0.2,
                        width: 1
                    }
                },
                detectRetina: true,
                interactivity: {
                    events: {
                        onHover: { enable: true, mode: 'repulse' },
                        resize: true
                    },
                    modes: {
                        repulse: { distance: 70, duration: 0.3 }
                    }
                }
            });
        }
    </script>
</body>
</html>
